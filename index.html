<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Zero</title>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTERADO) */
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: transparent;
}

video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -100;
}

.blur-ativo .tela:not(.ativa) {
    filter: blur(6px) brightness(0.4);
    transform: scale(0.98);
    transition: 0.3s;
}

.tela:not(#home)::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 1;
}

.tela {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    overflow: hidden;
}

.tela.ativa {
    display: block;
}

#home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.logo {
    font-size: 2.5rem;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

button {
    margin: 10px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}

.botao-audio {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.erro {
    margin-top: 30%;
    font-size: 1.5rem;
    opacity: 0.7;
}

.login-box {
    margin-top: 25%;
}

.login-box input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    background: black;
    border: 1px solid white;
    color: white;
}

.perfil-box {
    max-width: 700px;
    margin: 80px auto;
    padding: 20px;
    text-align: left;
    border: 1px solid white;
    background: rgba(0,0,0,0.6);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
}

.scroll {
    max-height: 300px;
    overflow-y: auto;
}

#textoLoading {
    animation: piscar 1s infinite;
}

@keyframes piscar {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

#historia {
    overflow-y: auto;
    padding: 20px 0;
}

.btn-voltar {
    margin: 30px auto 60px;
    display: block;
}

.historia-texto {
    max-width: 700px;
    width: 90%;
    margin: 40px auto;
    padding: 20px;
    line-height: 1.8;
    text-align: left;
    font-size: 1.1rem;
    border: 1px solid white;
    background: rgba(0,0,0,0.5);
    box-sizing: border-box;
}
</style>
</head>

<body>

<!-- 🔊 áudio -->
<audio id="audioGlitch" loop preload="auto">
    <source src="001.mp3" type="audio/mpeg">
</audio>

<button class="botao-audio" onclick="iniciarSistema()">
>>> INICIAR TRANSMISSÃO
</button>

<!-- vídeo -->
<video autoplay muted loop playsinline id="bgVideo">
    <source src="01.mp4" type="video/mp4">
</video>

<!-- áudio duplicado (mantido como você pediu) -->
<audio id="audioGlitch" loop>
    <source src="001.mp3">
</audio>

<button class="botao-audio" onclick="iniciarSistema()">
>>> INICIAR TRANSMISSÃO
</button>

<!-- HOME -->
<div id="home" class="tela ativa">
    <div class="logo">FREQUÊNCIA ZERO</div>

    <button onclick="abrirTela('personagem')">Identificar Personagem</button>
    <button onclick="abrirTela('elenco')">Elenco</button>
    <button onclick="abrirTela('historia')">História</button>

    <!-- 🔥 NOVOS BOTÕES -->
    <button onclick="abrirTela('mapa')">Mapa do RPG</button>
    <button onclick="abrirTela('promocoes')">Promoções</button>
    <button onclick="abrirTela('documentos')">Documentos</button>
</div>

<!-- (SEU CÓDIGO ORIGINAL CONTINUA IGUAL...) -->

<!-- 🗺️ MAPA -->
<div id="mapa" class="tela">
    <div class="perfil-box">
        <h2>MAPA DO COLÉGIO</h2>

        <!-- 🔥 TROQUE AQUI -->
        <img src="mapa.jpg" style="width:100%; border:1px solid white;">

        <p>Mapa geral da instituição.</p>
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- 🎬 PROMOÇÕES -->
<div id="promocoes" class="tela">
    <div class="perfil-box">
        <h2>PROMOÇÕES / EVENTOS</h2>

        <div class="scroll">
            <video controls style="width:100%;">
                <source src="promo.mp4" type="video/mp4">
            </video>

            <p>
                Evento especial chegando... prepare-se para sobreviver.
            </p>
        </div>
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- 📄 DOCUMENTOS -->
<div id="documentos" class="tela">
    <div class="perfil-box">
        <h2>DOCUMENTOS DO RPG</h2>

        <div class="scroll">
            <p>
                RELATÓRIO 01:<br><br>
                Os primeiros sinais foram ignorados...
            </p>

            <hr>

            <video controls style="width:100%;">
                <source src="doc.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<script>
/* SEU JS ORIGINAL — NÃO ALTERADO */
function abrirTela(id) {
    const erro = document.getElementById("erroLogin");
    if (erro) {
        erro.style.display = "none";
        if (timerErro) { clearTimeout(timerErro); timerErro = null; }
    }

    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');

    const botaoAudio = document.querySelector(".botao-audio");

    if (id !== 'home') {
        document.body.classList.add('blur-ativo');
        botaoAudio.style.display = "none";
    } else {
        document.body.classList.remove('blur-ativo');
        botaoAudio.style.display = "block";
    }
}

function voltar() {
    abrirTela('home');
}

function iniciarSistema() {
    const audio = document.getElementById("audioGlitch");
    const botaoAudio = document.querySelector(".botao-audio");

    audio.volume = 0.5;
    audio.load();

    audio.play().then(() => {
        botaoAudio.style.display = "none";
    }).catch((erro) => {
        console.log("Erro ao tocar o áudio:", erro);
        alert("O áudio não iniciou.");
    });
}
</script>

</body>
</html>
