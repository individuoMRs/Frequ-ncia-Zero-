<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Zero</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: transparent;
}

/* 🎥 vídeo fundo */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -100;
}

/* blur */
.blur-ativo .tela:not(.ativa) {
    filter: blur(6px) brightness(0.4);
}

/* telas */
.tela {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
}

.tela.ativa {
    display: block;
}

/* home */
#home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* botões */
button {
    margin: 10px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}

/* botão áudio */
.botao-audio {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

/* caixas estilo sistema */
.caixa {
    max-width: 700px;
    width: 90%;
    margin: 40px auto;
    padding: 20px;
    border: 1px solid white;
    background: rgba(0,0,0,0.5);
    text-align: left;
}

/* scroll vertical */
.scroll {
    max-height: 300px;
    overflow-y: auto;
}

/* mapa */
.mapa-img {
    width: 90%;
    max-width: 800px;
    border: 1px solid white;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- 🎥 vídeo -->
<video autoplay muted loop playsinline>
    <source src="01.mp4" type="video/mp4">
</video>

<!-- 🔊 áudio (CORRIGIDO: único) -->
<audio id="audioGlitch" loop preload="auto">
    <source src="001.mp3" type="audio/mpeg">
</audio>

<!-- botão iniciar -->
<button class="botao-audio" onclick="iniciarSistema()">
>>> INICIAR TRANSMISSÃO
</button>

<!-- HOME -->
<div id="home" class="tela ativa">
    <h1>FREQUÊNCIA ZERO</h1>

    <button onclick="abrirTela('personagem')">Identificar Personagem</button>
    <button onclick="abrirTela('elenco')">Elenco</button>
    <button onclick="abrirTela('historia')">História</button>

    <!-- NOVOS -->
    <button onclick="abrirTela('mapa')">Mapa</button>
    <button onclick="abrirTela('promocoes')">Promoções</button>
    <button onclick="abrirTela('documentos')">Documentos</button>
</div>

<!-- LOGIN -->
<div id="personagem" class="tela">
    <div class="caixa">
        <h2>IDENTIFICAÇÃO</h2>
        <input id="nome" placeholder="Nome"><br>
        <input id="senha" type="password" placeholder="Senha"><br>
        <button onclick="logar()">ACESSAR</button>
        <p id="erroLogin" style="display:none;color:red;">ACESSO NEGADO</p>
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- ELENCO -->
<div id="elenco" class="tela">
    <div class="caixa">
        FALHA NA TRANSMISSÃO...
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- HISTORIA -->
<div id="historia" class="tela">
    <div class="caixa">
        História do surto...
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- MAPA -->
<div id="mapa" class="tela">
    <img src="mapa.jpg" class="mapa-img">
    <br>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- PROMOÇÕES -->
<div id="promocoes" class="tela">
    <div class="caixa">
        <h2>PROMOÇÕES</h2>

        <div class="scroll">
            <p>EM BREVE...</p>
            <p>Evento especial chegando...</p>
            <p>Nova missão liberada...</p>
            <p>[espaço para vídeos]</p>
        </div>
    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- DOCUMENTOS -->
<div id="documentos" class="tela">
    <div class="caixa">
        <h2>DOCUMENTOS</h2>

        <div class="scroll">
            <p>EM BREVE...</p>
            <p>RELATÓRIO 01...</p>
            <p>RELATÓRIO 02...</p>
            <p>[espaço para vídeos]</p>
        </div>
    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<script>

// trocar telas (CORRIGIDO)
function abrirTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');

    if (id !== 'home') {
        document.body.classList.add('blur-ativo');
    } else {
        document.body.classList.remove('blur-ativo');
    }
}

// voltar
function voltar() {
    abrirTela('home');
}

// áudio (FUNCIONANDO)
function iniciarSistema() {
    const audio = document.getElementById("audioGlitch");
    audio.volume = 0.5;

    audio.play().then(() => {
        document.querySelector(".botao-audio").style.display = "none";
    }).catch(() => {
        alert("Clique novamente para iniciar o áudio.");
    });
}

// login
const perfis = [
    { nome: "adm01", senha: "1234", destino: "home" }
];

function logar() {
    const nome = document.getElementById("nome").value.toLowerCase();
    const senha = document.getElementById("senha").value;

    const perfil = perfis.find(p => p.nome === nome && p.senha === senha);

    if (perfil) {
        abrirTela(perfil.destino);
    } else {
        document.getElementById("erroLogin").style.display = "block";
    }
}

</script>

</body>
</html>
