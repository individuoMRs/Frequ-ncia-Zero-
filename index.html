<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Zero</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: transparent;
}

/* 🎥 vídeo fundo */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -100;
}

/* 🎭 blur e escurecer fundo */
.blur-ativo .tela:not(.ativa) {
    filter: blur(6px) brightness(0.4);
    transform: scale(0.98);
    transition: 0.3s;
}

/* borda escura */
.tela:not(#home)::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 1;
}

.tela {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    overflow: hidden;
}

.tela.ativa {
    display: block;
}

/* home */
#home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* logo */
.logo {
    font-size: 2.5rem;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* botões */
button {
    margin: 10px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}

/* botão iniciar */
.botao-audio {

    padding: 15px 25px;

    border: 1px solid white;

    background: transparent;

    color: white;

    cursor: pointer;

}

.botao-audio:hover {

    background: white;

    color: black;

}

</style>

</head>

<body>

<!-- 🔊 ÁUDIO DO SITE -->

<audio id="audioGlitch" loop preload="auto">

    <source src="001.mp3" type="audio/mpeg">

</audio>

<!-- 🔘 BOTÃO -->

<button class="botao-audio" onclick="iniciarSistema()">

>>> INICIAR TRANSMISSÃO

</button>

<script>

const audio = document.getElementById("audioGlitch");

/* 🔥 FUNÇÃO PRINCIPAL */

function iniciarSistema() {

    audio.volume = 0.5;

    // tenta tocar

    audio.play().then(() => {

        console.log("Áudio iniciado");

    }).catch(() => {

        // 🔥 fallback iPhone

        const unlock = () => {

            audio.play();

            document.removeEventListener("touchstart", unlock);

            document.removeEventListener("click", unlock);

        };

        document.addEventListener("touchstart", unlock);

        document.addEventListener("click", unlock);

    });

    // esconde botão

    document.querySelector(".botao-audio").style.display = "none";

}

/* 🔥 GARANTE QUE O ÁUDIO CARREGUE */

document.addEventListener("DOMContentLoaded", () => {

    audio.load();

})
}

/* erro */
.erro {
    margin-top: 30%;
    font-size: 1.5rem;
    opacity: 0.7;
}

/* login */
.login-box {
    margin-top: 25%;
}

.login-box input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    background: black;
    border: 1px solid white;
    color: white;
}

/* perfil */
.perfil-box {
    max-width: 700px;
    margin: 80px auto;
    padding: 20px;
    text-align: left;
    border: 1px solid white;
    background: rgba(0,0,0,0.6);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
}

.scroll {
    max-height: 300px;
    overflow-y: auto;
}

/* loading */
#textoLoading {
    animation: piscar 1s infinite;
}

@keyframes piscar {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

/* história */
#historia {
    overflow-y: auto;
    padding: 20px 0;
}

.btn-voltar {
    margin: 30px auto 60px;
    display: block;
}

.historia-texto {
    max-width: 700px;
    width: 90%;
    margin: 40px auto;
    padding: 20px;
    line-height: 1.8;
    text-align: left;
    font-size: 1.1rem;
    border: 1px solid white;
    background: rgba(0,0,0,0.5);
    box-sizing: border-box;
}
</style>
</head>

<body>

<!-- vídeo -->
<video autoplay muted loop playsinline id="bgVideo">
    <source src="01.mp4" type="video/mp4">
</video>

<!-- áudio -->
<audio id="audioGlitch" loop preload="auto">
    <source src="001.mp3">
</audio>

<!-- botão iniciar (APENAS UM) -->
<button class="botao-audio" onclick="iniciarSistema()">
>>> INICIAR TRANSMISSÃO
</button>

<!-- HOME -->
<div id="home" class="tela ativa">
    <div class="logo">FREQUÊNCIA ZERO</div>

    <button onclick="abrirTela('personagem')">Identificar Personagem</button>
    <button onclick="abrirTela('elenco')">Elenco</button>
    <button onclick="abrirTela('historia')">História</button>
</div>

<!-- LOGIN -->
<div id="personagem" class="tela">
    <div class="login-box">
        <h2>IDENTIFICAÇÃO NECESSÁRIA</h2>

        <input type="text" id="nome" placeholder="Nome">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="logar()">ACESSAR</button>

        <p id="erroLogin" style="display:none;color:red;">
            ACESSO NEGADO
        </p>
    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- ELENCO -->
<div id="elenco" class="tela">
    <div class="erro">
        FALHA NA TRANSMISSÃO...<br><br>
        AGUARDE ATUALIZAÇÃO DO SISTEMA
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- LOADING -->
<div id="loading" class="tela">
    <div class="perfil-box">
        <h2>SISTEMA</h2>
        <div class="scroll">
            <p id="textoLoading">
                INICIANDO VARREDURA...<br><br>
                LOCALIZANDO REGISTRO DO PERSONAGEM...
            </p>
        </div>
    </div>
</div>

<!-- PERFIL -->
<div id="perfil1" class="tela">
    <div class="perfil-box">
        <h2>ADM01</h2>
        <div class="scroll">
            <p>Teste de sistema...</p>
        </div>
    </div>
    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- HISTÓRIA -->
<div id="historia" class="tela">
    <div class="historia-texto">
        Um novo aplicativo se populariza entre o final de 2024 e 2025...
    </div>
    <button onclick="voltar()"><<< RETORNAR AO SINAL</button>
</div>

<script>

// trocar telas
function abrirTela(id) {
    const erro = document.getElementById("erroLogin");
    if (erro) erro.style.display = "none";

    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');

    const botaoAudio = document.querySelector(".botao-audio");

    if (id !== 'home') {
        document.body.classList.add('blur-ativo');
        botaoAudio.style.display = "none";
    } else {
        document.body.classList.remove('blur-ativo');
        botaoAudio.style.display = "block";
    }
}

// voltar
function voltar() {
    abrirTela('home');
}

// 🔥 CORREÇÃO DO ÁUDIO
function iniciarSistema() {
    const audio = document.getElementById("audioGlitch");
    const video = document.getElementById("bgVideo");

    audio.volume = 0.5;

    audio.play().then(() => {
        console.log("Áudio funcionando");
    }).catch(() => {
        console.log("Erro ao iniciar áudio");
    });

    if (video) {
        video.play().catch(() => {});
    }

    document.querySelector(".botao-audio").style.display = "none";
}

// LOGIN
const perfis = [
    { nome: "adm01", senha: "1234", destino: "perfil1" }
];

function logar() {
    const nome = document.getElementById("nome").value.toLowerCase();
    const senha = document.getElementById("senha").value;

    const perfil = perfis.find(p => p.nome === nome && p.senha === senha);

    if (perfil) {
        abrirTela("loading");
        setTimeout(() => abrirTela(perfil.destino), 2000);
    } else {
        document.getElementById("erroLogin").style.display = "block";
    }
}

</script>

</body>
</html>
