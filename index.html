<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Zero</title>

<style>
body {

    margin: 0;

    height: 100vh;

    font-family: Arial;

    color: white;

    background: url('02.jpg') no-repeat center center;

    background-size: cover;

}


.caixa {
    width: 90%;
    max-width: 500px;

    padding: 20px;

    border: 1px solid white;
    background: rgba(0,0,0,0.6);

    backdrop-filter: blur(8px);

    text-align: left;
}

/* 🔥 sombra suave cinematográfica */

body::before {

    content: "";

    position: fixed;

    inset: 0;

    background: radial-gradient(

        circle at center,

        rgba(0,0,0,0.3),

        rgba(0,0,0,0.85)

    );

    z-index: -1;

}

/* 🔥 LAYOUT DIVIDIDO */
.painel {
    display: flex;
    width: 100%;
    height: 100%;
}

/* 🖤 LADO ESCURO (UI) */
.lado-esquerdo {
    width: 40%;
    background: linear-gradient(to right, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
}

/* 🖼️ LADO IMAGEM */
.lado-direito {
    position: relative;
    width: 60%;
    background: url('02.jpg') no-repeat center center;
    background-size: cover;
}

/* 🔥 CAMADA ESCURA POR CIMA */
.lado-direito::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: linear-gradient(
        to left,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.7)
    );

    pointer-events: none;
}


/* 🎭 blur fundo */
.blur-ativo .lado-direito {
    filter: blur(6px) brightness(0.5);
}

/* LOGO */
.logo {
    font-size: 2rem;
    letter-spacing: 6px;
    margin-bottom: 30px;
    text-align: center;
}

/* BOTÕES */
button {
    margin-top: 15px;
    padding: 12px 25px;

    background: transparent;
    border: 1px solid white;
    color: white;

    cursor: pointer;
    width: 250px;

    transition: 0.2s;
}

button:hover {
    background: white;
    color: black;
}

/* TELAS */
.tela {

    display: none;

    position: absolute;

    inset: 0;

    display: flex;

    align-items: center;

    justify-content: center;

    flex-direction: column;

    text-align: center;

    padding: 20px;

    box-sizing: border-box;

}

.tela.ativa {

    display: flex;

}

/* LOGIN */
.login-box input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    background: black;
    border: 1px solid white;
    color: white;
    width: 200px;
}

/* PERFIL */
.perfil-box {
    border: 1px solid white;
    padding: 15px;
    background: rgba(0,0,0,0.6);
    width: 90%;
    max-width: 400px;
}

.scroll {
    max-height: 200px;
    overflow-y: auto;
}

/* HISTÓRIA */
.historia-texto {
    border: 1px solid white;
    padding: 15px;
    background: rgba(0,0,0,0.6);
    width: 90%;
    max-width: 400px;
    text-align: left;
}

/* LOADING */
#textoLoading {
    animation: piscar 1s infinite;
}

@media (max-width: 768px) {

    .logo {
        font-size: 1.8rem;
    }

    button {
        width: 100%;
        max-width: 300px;
    }

    .caixa {
        max-width: 90%;
        font-size: 0.95rem;
    }
}

@keyframes piscar {
    50% {opacity:0.3;}
}
</style>
</head>

<body>

<div class="painel">

<!-- 🖤 ESQUERDA -->
<div class="lado-esquerdo">

<!-- HOME -->
<div id="home" class="tela ativa">
    <div class="logo">FREQUÊNCIA ZERO</div>

    <button onclick="abrirTela('personagem')">Identificar Personagem</button>
    <button onclick="abrirTela('elenco')">Elenco</button>
    <button onclick="abrirTela('historia')">História</button>
</div>

<!-- LOGIN -->
<div id="personagem" class="tela">
    <div class="login-box">
        <h2>ACESSO</h2>

        <input type="text" id="nome" placeholder="Nome">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="logar()">ENTRAR</button>

        <p id="erroLogin" style="display:none;color:red;">
            ACESSO NEGADO
        </p>
    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- ELENCO -->
<div id="elenco" class="tela">
    <div class="perfil-box">
        <p>FALHA NA TRANSMISSÃO...</p>
        <p>AGUARDE ATUALIZAÇÃO DO SISTEMA</p>
    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- LOADING -->
<div id="loading" class="tela">
    <div class="caixa">
        <p id="textoLoading">
            BUSCANDO ACESSO...<br><br>
            AGUARDE...
        </p>
    </div>
</div>

<!-- PERFIL 1 -->
<div id="perfil1" class="tela">
    <div class="caixa">

        <h2>PERSONAGEM</h2>

        <!-- ESCREVA AQUI -->
        <p>História do personagem...</p>

    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- PERFIL 2 -->
<div id="perfil2" class="tela">
    <div class="caixa">

        <h2>PERSONAGEM</h2>

        <!-- ESCREVA AQUI -->
        <p>História do personagem...</p>

    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

<!-- HISTÓRIA -->
<div id="historia" class="tela">
    <div class="caixa">

        <!-- ESCREVA AQUI -->
        <p>
        Um novo aplicativo se populariza...
        </p>

    </div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

    <button onclick="voltar()"><<< VOLTAR</button>
</div>

</div>

<!-- 🖼️ DIREITA -->
<div class="lado-direito"></div>

</div>

<script>

// trocar telas
function abrirTela(id) {

    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');

    if (id !== 'home') {
        document.body.classList.add('blur-ativo');
    } else {
        document.body.classList.remove('blur-ativo');
    }
}

function voltar() {
    abrirTela('home');
}

// LOGIN
const perfis = [
    { nome: "adm01", senha: "1234", destino: "perfil1" },
    { nome: "adm02", senha: "abcd", destino: "perfil2" }
];

function logar() {
    const nome = document.getElementById("nome").value.toLowerCase();
    const senha = document.getElementById("senha").value;

    const perfil = perfis.find(p => p.nome === nome && p.senha === senha);

    if (perfil) {
        abrirTela("loading");

        setTimeout(() => {
            abrirTela(perfil.destino);
        }, 2000);

    } else {
        document.getElementById("erroLogin").style.display = "block";
    }
}

</script>

</body>
</html>
